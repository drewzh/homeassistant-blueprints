blueprint:
  name: Advanced Motion Lights
  description: >
    Motion-activated lights with Adaptive Lighting integration. Supports day/night lights,
    optional night mode sensor, optional blocking entity, and configurable timeout.
    Lights switched on manually (outside of motion) also auto-off after the same timeout.
  domain: automation
  input:
    motion_sensor:
      name: Motion Sensor
      description: "Select the motion sensor that will trigger the automation."
      selector:
        entity:
          domain: binary_sensor

    main_lights:
      name: Main/Day Lights
      description: "Lights to turn on during normal/day mode."
      selector:
        entity:
          domain: light
          multiple: true

    night_lights:
      name: Night Mode Lights (Optional)
      description: "Lights to turn on in night mode (if night mode sensor is configured)."
      selector:
        entity:
          domain: light
          multiple: true
      default: []

    timeout:
      name: Timeout (seconds)
      description: >
        Seconds to wait after motion clears before turning lights off.
        Also used as the auto-off timer when lights are switched on manually without motion.
        If motion is detected again during this time, the countdown resets.
      default: 120
      selector:
        number:
          min: 1
          max: 3600
          unit_of_measurement: seconds
          mode: box

    block_entity:
      name: Blocking Entity (Optional)
      description: >
        If defined, the lights won't turn on when this entity is in a blocking state (e.g. 'on').
        For example, you can use a sleep mode switch. Leave empty to ignore.
        Note: only gates motion-triggered activation. Manually switched lights still auto-off.
      selector:
        entity: {}
      default: ""

    night_mode_entity:
      name: Night Mode Entity (Optional)
      description: >
        If defined, when this entity is 'on', the blueprint will use "Night Mode Lights".
        Otherwise, main lights will be used. Brightness is handled by Adaptive Lighting.
      selector:
        entity: {}
      default: ""

mode: restart
max_exceeded: silent

#############################################################
# Variables
#############################################################
variables:
  motion_sensor: !input motion_sensor
  main_lights: !input main_lights
  night_lights: !input night_lights
  timeout: !input timeout
  block_entity: !input block_entity
  night_mode_entity: !input night_mode_entity

#############################################################
# Triggers
#   - motion: motion sensor goes from off -> on
#   - manual: any main light is turned on from outside this automation
#############################################################
trigger:
  - platform: state
    entity_id: !input motion_sensor
    from: "off"
    to: "on"
    id: motion

  - platform: state
    entity_id: !input main_lights
    to: "on"
    id: manual

#############################################################
# Actions — branched by trigger.id
#############################################################
action:
  - choose:

      ###########################################################
      # MOTION BRANCH — triggered by the motion sensor
      ###########################################################
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'motion' }}"
        sequence:
          # Bail out if blocking entity is active
          - condition: template
            value_template: >
              {{ block_entity == '' or not is_state(block_entity, 'on') }}

          # Turn on the appropriate lights (night vs day)
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {% if night_mode_entity != '' %}
                        {{ is_state(night_mode_entity, 'on') }}
                      {% else %}
                        false
                      {% endif %}
                sequence:
                  - service: light.turn_on
                    target:
                      entity_id: !input night_lights
            default:
              - service: light.turn_on
                target:
                  entity_id: !input main_lights

          # Wait for motion to clear for the full timeout duration
          - wait_for_trigger:
              - platform: state
                entity_id: !input motion_sensor
                from: "on"
                to: "off"
                for:
                  seconds: "{{ timeout }}"

          # Safety check: only proceed if motion is still clear
          - condition: state
            entity_id: !input motion_sensor
            state: "off"

          # Turn off all involved lights
          - service: light.turn_off
            target:
              entity_id: !input main_lights
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ night_lights | length > 0 }}"
                sequence:
                  - service: light.turn_off
                    target:
                      entity_id: "{{ night_lights }}"

      ###########################################################
      # MANUAL BRANCH — a main light was turned on manually
      ###########################################################
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'manual' }}"
        sequence:
          - choose:

              # Sub-branch A: motion is currently active
              # Stay with the motion-complete wait so lights remain on while occupied
              - conditions:
                  - condition: state
                    entity_id: !input motion_sensor
                    state: "on"
                sequence:
                  - wait_for_trigger:
                      - platform: state
                        entity_id: !input motion_sensor
                        from: "on"
                        to: "off"
                        for:
                          seconds: "{{ timeout }}"

                  - condition: state
                    entity_id: !input motion_sensor
                    state: "off"

                  - service: light.turn_off
                    target:
                      entity_id: !input main_lights
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ night_lights | length > 0 }}"
                        sequence:
                          - service: light.turn_off
                            target:
                              entity_id: "{{ night_lights }}"

            # Sub-branch B: no motion — simple countdown then auto-off
            default:
              - delay:
                  seconds: "{{ timeout }}"

              # Only turn off if no motion started during the delay
              - condition: state
                entity_id: !input motion_sensor
                state: "off"

              - service: light.turn_off
                target:
                  entity_id: !input main_lights
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ night_lights | length > 0 }}"
                    sequence:
                      - service: light.turn_off
                        target:
                          entity_id: "{{ night_lights }}"
